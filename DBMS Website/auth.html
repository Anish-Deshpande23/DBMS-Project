<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulDrops | Login</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="api.js"></script>
<script src="main.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">Soul<span>Drops</span></a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a class="active" href="auth.html">Login</a>
        <a href="men.html">Men</a>
        <a href="women.html">Women</a>
        <a href="sneakers.html">Sneakers</a>
        <a href="cart.html">Cart</a>
        <a href="track.html">Track Delivery</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-head">
      <h1>Welcome Back</h1>
      <p>Login or create account to track orders and manage your cart.</p>
    </section>

    <section class="auth-grid">
      <article class="card">
        <h2>Login</h2>
        <form>
          <div class="field">
            <label for="login-email">Email</label>
            <input id="login-email" type="email" placeholder="you@example.com" />
          </div>
          <div class="field">
            <label for="login-pass">Password</label>
            <input id="login-pass" type="password" placeholder="Password" />
          </div>
          <button class="btn" type="submit">Login</button>
        </form>
      </article>

      <article class="card">
        <h2>Create Account</h2>
        <form>
          <div class="field">
            <label for="name">Full Name</label>
            <input id="name" type="text" placeholder="Your full name" />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" />
          </div>
          <div class="field">
            <label for="phone">Phone</label>
            <input id="phone" type="tel" placeholder="+91 90000 00000" />
          </div>
          <div class="field">
            <label for="create-pass">Create Password</label>
            <input id="create-pass" type="password" placeholder="Create password" />
          </div>
          <button class="btn" type="submit">Create Account</button>
        </form>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner"><p>&copy; 2026 SoulDrops.</p></div>
  </footer>
</body>
</html>
